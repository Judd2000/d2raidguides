<div class="flex flex-col items-center">
  <div class="flex flex-col w-fit">
    <div class="flex flex-row justify-center items-center space-x-2">
      <span class="text-lg font-bold italic pr-4">{{rd()?.name}}</span>
      <img src="{{rd()?.imgUrl}}" class="w-15" />
    </div>
    <app-encounter-list
      [encounters]="rd()?.encounters ?? []"
      [rdPath]="rd()?.path"
      [color]="rd()?.colorName"
      [isLarge]="true"
    />
  </div>
</div>
